name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: thianthian/blog-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read package version
        id: version
        working-directory: ./blog-api
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=${VERSION}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 image and push version tag
        uses: docker/build-push-action@v6
        with:
          context: ./blog-api
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}

      - name: Deploy image on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ~/thianchai-dejdee
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd blog-api
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} IMAGE_TAG=${{ steps.version.outputs.tag }} docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

      - name: Webhook alert success
        if: ${{ success() && secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"success","image":"${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}","branch":"main","commit":"${{ github.sha }}"}'
